name: Deploy to InfinityFree
on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Sync Files
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v3

    # 1. Set up Node.js environment
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # 2. CORRECTED: Install dependencies and Build
    - name: Install dependencies and Build
      run: |
        # No 'cd' command needed because package.json is at the root
        npm install
        npm run build 
    
    # 3. Corrected deployment step
    - name: Sync to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: htdocs/
        local-dir: out/ # <--- FINAL FIX: Next.js often uses 'out' for static export
