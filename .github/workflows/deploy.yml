name: Deploy to InfinityFree
on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Sync Files
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v3

    # 1. Set up Node.js environment
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # 2. NEW FIX: Change directory before running build commands
    - name: Install dependencies and Build
      run: |
        cd package/src/app/ # <--- CRITICAL FIX: Change directory to where package.json lives
        npm install
        npm run build
    
    # 3. Corrected deployment step
    - name: Sync to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: htdocs/
        local-dir: package/src/app/build/ # <--- Path to the output, relative to the root
