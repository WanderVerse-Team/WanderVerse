name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

jobs:
  buildAndroid:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
      # Free up disk space so Unity 6 fits
      - name: Free Disk Space for Unity
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      # Checkout Repository (LFS false to prevent immediate bandwidth use)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: false 

      # Create a unique ID for the LFS files to use as a cache key
      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      # Cache the .git/lfs directory
      - name: Cache Git LFS
        uses: actions/cache@v3
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}-v1
          restore-keys: |
            lfs-

      # Pull LFS files (Uses cache if available)
      - name: Git LFS Pull
        run: git lfs pull

      # Fix Permissions
      - name: Fix File Permissions
        run: |
          sudo chown -R $USER:$USER $GITHUB_WORKSPACE
          sudo chmod -R 777 $GITHUB_WORKSPACE

      # Restore Firebase Config
      - name: Restore google-services.json
        run: echo '${{ secrets.FIREBASE_CONFIG }}' > WanderVerse_Unity/Assets/google-services.json
        continue-on-error: true

      # Cache Unity Library (Speeds up build time)
      - name: Cache Library
        uses: actions/cache@v3
        with:
          path: WanderVerse_Unity/Library
          key: Library-Android-${{ hashFiles('WanderVerse_Unity/Assets/**') }}
          restore-keys: |
            Library-Android-

      # Build Android APK
      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          projectPath: WanderVerse_Unity
          unityVersion: 6000.3.2f1
          buildName: WanderVerse_v1
          allowDirtyBuild: true
          versioning: None

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WanderVerse-Android-Build
          path: build/Android/WanderVerse_v1.apk